services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: genlab
      POSTGRES_USER: genlab
      POSTGRES_PASSWORD: genlab-change-me
    volumes: [genlab-db:/var/lib/postgresql/data]
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      GENLAB_DATABASE_URL: postgresql+psycopg://genlab:genlab-change-me@db/genlab
      GENLAB_SECRET_KEY: change-this-secret-in-production-please
      GENLAB_CORS_ORIGINS: http://localhost:5173
    volumes: [./data:/app/data]
    ports: ["8000:8000"]
    depends_on: [db]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  genlab-db:
